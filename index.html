<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Productos – Fetch + PHP OOP + MySQL</title>

    <!-- Bootstrap 5 CSS para diseño y botones -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert2 para alertas amigables -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; }
        #btnBuscar { min-width: 110px; }
        .table thead { background-color: #0d6efd; color: #fff; }
        .table tbody tr:hover { background-color: #e8f0fe; cursor: pointer; }
        #seccionBuscar { border-top: 2px dashed #0d6efd; padding-top: 1rem; }
    </style>
</head>
<body>
<div class="container py-4">

    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">Formulario de gestión de Productos</h2>
    </div>

    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white fw-semibold" id="encabezadoFormulario">
            Registro de Producto
        </div>
        <div class="card-body">
          
            <div id="formProducto">

                <input type="hidden" id="id" name="id" value="">

                <div class="row g-3">
                    <!-- Código del producto -->
                    <div class="col-md-3">
                        <label for="Codigo" class="form-label fw-semibold">Código</label>
                        <input type="text"
                               class="form-control"
                               id="Codigo"
                               name="Codigo"
                               placeholder="Ej: PROD-001"
                               maxlength="20"
                               required>
                    </div>

                    <!-- Nombre del producto -->
                    <div class="col-md-4">
                        <label for="Producto" class="form-label fw-semibold">Producto</label>
                        <input type="text"
                               class="form-control"
                               id="Producto"
                               name="Producto"
                               placeholder="Nombre del producto"
                               maxlength="100"
                               required>
                    </div>

                    <!-- Precio -->
                    <div class="col-md-2">
                        <label for="Precio" class="form-label fw-semibold">Precio ($)</label>
                        <input type="number"
                               class="form-control"
                               id="Precio"
                               name="Precio"
                               placeholder="0.00"
                               step="0.01"
                               min="0.01"
                               required>
                    </div>

                    <!-- Cantidad: min=0 para permitir editar productos agotados -->
                    <div class="col-md-2">
                        <label for="Cantidad" class="form-label fw-semibold">Cantidad</label>
                        <input type="number"
                               class="form-control"
                               id="Cantidad"
                               name="Cantidad"
                               placeholder="0"
                               step="1"
                               min="0"
                               required>
                    </div>
                </div>

                <div class="mt-3 d-flex gap-2">
                    <!--
                       "Guardar, Modificar"
                        script.js decide cuál acción enviar según el estado del formulario.
                    -->
                    <button type="button"
                            class="btn btn-primary"
                            id="btnRegistrar"
                            onclick="enviarFormulario('Guardar')">
                        Registrar
                    </button>

                    <button type="button"
                            class="btn btn-warning text-white"
                            id="btnActualizar"
                            onclick="enviarFormulario('Modificar')"
                            style="display:none;">
                        Actualizar
                    </button>

                    <button type="button"
                            class="btn btn-secondary"
                            onclick="limpiarFormulario()">
                        Limpiar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div class="card shadow mb-4">
        <div class="card-header bg-info text-white fw-semibold">
            Buscar Producto
        </div>
        <div class="card-body">
            <div class="d-flex gap-2">
                <input type="text"
                       class="form-control"
                       id="campoBuscar"
                       placeholder="Buscar por código o nombre...">

                <!-- Botón Buscar: buscarProducto() en script.js -->
                <button type="button"
                        class="btn btn-info text-white"
                        id="btnBuscar"
                        onclick="buscarProducto()">
                    Buscar
                </button>

                <!-- Botón para limpiar búsqueda -->
                <button type="button"
                        class="btn btn-outline-secondary"
                        onclick="limpiarBusqueda()">
                    Limpiar
                </button>
            </div>
        </div>
    </div>

    <!-- Tabla de Productos -->
    <div class="card shadow">
        <div class="card-header bg-success text-white fw-semibold">
            Lista de Productos
        </div>
        <div class="card-body p-0">
            <!-- Tabla donde se muestran todos los productos. -->
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0" id="tablaProductos">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-3">
                                Cargando productos...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
